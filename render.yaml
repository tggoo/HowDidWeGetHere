databases:
  - name: howdidwegethere-db
    databaseName: howdidwegethere
    user: howdidwegethere
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    runtime: docker
    name: howdidwegethere-api
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DOTNET_hostBuilder__reloadConfigOnChange
        value: false
      - key: Database__ApplyMigrationsOnStartup
        value: true
      - key: Database__FailStartupOnMigrationError
        value: false
      - key: DataProtection__KeysPath
        value: /tmp/howdidwegethere-data-protection-keys
      - key: DATABASE_URL
        fromDatabase:
          name: howdidwegethere-db
          property: connectionString
      - key: AdminBootstrap__Email
        sync: false
      - key: AdminBootstrap__Password
        sync: false
      - key: Cors__AllowedOrigins__0
        sync: false

  - type: web
    runtime: static
    name: howdidwegethere-web
    rootDir: web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
